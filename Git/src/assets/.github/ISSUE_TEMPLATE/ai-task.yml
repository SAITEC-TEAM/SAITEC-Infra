name: AI-ready Task
description: Capture a task in a format that both humans and AI tools can execute reliably.
title: "[Task] "
labels:
  - task
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should be achieved?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: What is in scope, out of scope, or constrained?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What concrete conditions define completion?
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Relevant files, docs, tickets, screenshots, or commands.
    validations:
      required: false
